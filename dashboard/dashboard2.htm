  <style>
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .preview-course-card {
      background: #232323;
      border: 1px solid #3f3f46;
      border-radius: 1rem;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      animation: cardIn 0.4s ease both;
    }

    .preview-course-card:hover {
      border-color: #71717a;
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    .preview-course-card:nth-child(1) { animation-delay: 0.05s; }
    .preview-course-card:nth-child(2) { animation-delay: 0.10s; }
    .preview-course-card:nth-child(3) { animation-delay: 0.15s; }
    .preview-course-card:nth-child(4) { animation-delay: 0.20s; }
    .preview-course-card:nth-child(5) { animation-delay: 0.25s; }
    .preview-course-card:nth-child(6) { animation-delay: 0.30s; }
    .preview-course-card:nth-child(7) { animation-delay: 0.35s; }
    .preview-course-card:nth-child(8) { animation-delay: 0.40s; }

    .preview-course-thumb {
      height: 7rem;
      background-size: cover;
      background-position: center;
    }

    .preview-card-actions {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      display: flex;
      gap: 0.25rem;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 10;
    }

    .preview-course-card:hover .preview-card-actions { opacity: 1; }

    .preview-card-action-btn {
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(63, 63, 70, 0.6);
      color: #d4d4d8;
      border-radius: 0.5rem;
      width: 1.75rem;
      height: 1.75rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
    }

    @media (max-width: 639px) {
      #courses-grid {
        grid-template-columns: 1fr !important;
        gap: 0.75rem !important;
      }

      #courses-grid .preview-course-card:nth-child(n+3) {
        display: none !important;
      }

      .preview-course-thumb {
        height: 5.5rem;
      }

      .preview-course-card .p-4 {
        padding: 0.75rem 1rem !important;
      }

      .preview-course-card h3 {
        font-size: 0.8125rem !important;
        line-height: 1.35;
        white-space: normal;
      }

      .preview-card-actions {
        display: none;
      }
    }
  </style>
</head>
