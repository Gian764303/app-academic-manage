<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: #111111;
      color: #fff;
      min-height: 100vh;
    }

    .app {
      max-width: 80rem;
      margin: 0 auto;
      padding: 1rem 1rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    @media (min-width: 768px) {
      .app { padding: 1.5rem 1.5rem 4rem; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .animate-in { animation: fadeIn 0.4s ease both; }

    /* ── HERO ── */
    .hero {
      position: relative;
      border-radius: 1.5rem;
      border: 1px solid #27272a;
      overflow: hidden;
      animation: fadeIn 0.5s ease both;
    }

    .hero-banner {
      width: 100%;
      height: 14rem;
      background-size: cover;
      background-position: center 57%;
      background-color: #18181b;
    }

    /* ── CURSOS ── */
    .panel {
      background: #181818;
      border: 1px solid #27272a;
      border-radius: 1.5rem;
      padding: 1.5rem;
      animation: fadeIn 0.5s 0.1s ease both;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .panel-header-left,
    .panel-header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .panel-title {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      cursor: default;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .btn-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #27272a;
      border: 1px solid #3f3f46;
      color: #d4d4d8;
      width: 2.25rem;
      height: 2.25rem;
      padding: 0;
      line-height: 0;
    }

    .btn-toggle svg {
      display: block;
      flex-shrink: 0;
      transform: translateY(1px);
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
      padding: 0.5rem 1rem;
    }

    .btn-secondary {
      background: #27272a;
      color: #d4d4d8;
      border: 1px solid #3f3f46;
      padding: 0.5rem 1rem;
    }

    .btn-icon {
      background: #27272a;
      border: 1px solid #3f3f46;
      color: #d4d4d8;
      width: 2.25rem;
      height: 2.25rem;
    }

    .courses-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }

    @media (min-width: 640px)  { .courses-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 768px)  { .courses-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1024px) { .courses-grid { grid-template-columns: repeat(4, 1fr); } }

    .course-card {
      background: #232323;
      border: 1px solid #3f3f46;
      border-radius: 1rem;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      animation: cardIn 0.4s ease both;
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .course-card:hover {
      border-color: #71717a;
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    .course-card:nth-child(1) { animation-delay: 0.05s; }
    .course-card:nth-child(2) { animation-delay: 0.10s; }
    .course-card:nth-child(3) { animation-delay: 0.15s; }
    .course-card:nth-child(4) { animation-delay: 0.20s; }
    .course-card:nth-child(5) { animation-delay: 0.25s; }
    .course-card:nth-child(6) { animation-delay: 0.30s; }
    .course-card:nth-child(7) { animation-delay: 0.35s; }
    .course-card:nth-child(8) { animation-delay: 0.40s; }

    .course-thumb {
      height: 7rem;
      background-size: cover;
      background-position: center;
    }

    .course-body { padding: 1rem; }

    .course-name {
      font-weight: 600;
      font-size: 0.875rem;
      letter-spacing: 0.025em;
      color: #e4e4e7;
    }

    .card-actions {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      display: flex;
      gap: 0.25rem;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 10;
    }

    .course-card:hover .card-actions { opacity: 1; }

    .card-action-btn {
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(63, 63, 70, 0.6);
      color: #d4d4d8;
      border-radius: 0.5rem;
      width: 1.75rem;
      height: 1.75rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
    }

    svg { display: block; }
  </style>
</head>
